{% extends "base.html" %}
{% block content %}
<div class="container text-center py-5" style="margin-top: 100px; margin-bottom: 100px;">
    <h2>Verify Account</h2>
    <p>Please click the button below to complete your account verification.</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">Verify My Account</button>
    </form>
</div>
{% endblock %}
