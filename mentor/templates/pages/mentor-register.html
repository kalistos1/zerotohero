<!DOCTYPE html>
<html lang="en">

<head>

	<!-- Meta Tags -->
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Mentor Registration | Mentoring</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content=" Mentoring">
	<meta name="keywords" content=" Mentoring">
	<meta name="author" content="Dreams Technologies">

	<!-- Favicon -->
	<link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon.png">

	<!-- Bootstrap CSS -->
	<link rel="stylesheet" href="assets/css/bootstrap.min.css">

	<!-- Fontawesome CSS -->
	<link rel="stylesheet" href="assets/plugins/fontawesome/css/fontawesome.min.css">
	<link rel="stylesheet" href="assets/plugins/fontawesome/css/all.min.css">

	<!-- Lucide Icon CSS -->
	<link rel="stylesheet" href="assets/plugins/lucide/lucide.css">

	<!-- Simplebar CSS -->
	<link rel="stylesheet" href="assets/plugins/simplebar/simplebar.min.css">

	<!-- Main CSS -->
	<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

	<!-- Main Wrapper -->
	<div class="main-wrapper">

		<!-- Start Content -->
		<div class="container-fuild z-1">
			<div class="auth-wrapper">

				<!-- start row -->
				<div class="row">

					<!-- start col -->
					<div class="col-lg-7">
						<div class="auth-wrapper-left">
							<div class="content-box mx-auto">
								<h1>“Growth starts when guidance meets passion.”</h1>
								<div class="auth-avatar">
									<div class="avatar-list-stacked avatar-group-lg">
										<span class="avatar border-0">
											<img src="assets/img/auth/avatar/avatar-1.png" alt="img">
										</span>
										<span class="avatar border-0">
											<img src="assets/img/auth/avatar/avatar-2.png" alt="img">
										</span>

										<span class="avatar border-0">
											<img src="assets/img/auth/avatar/avatar-4.png" alt="img">
										</span>
										<span class="avatar border-0">
											<img src="assets/img/auth/avatar/avatar-3.png" alt="img">
										</span>
										<span class="avatar border-0">
											<img src="assets/img/auth/avatar/avatar-5.png" alt="img">
										</span>
									</div>
									<div class="vertical-divider"></div>
									<div>
										<p>Trusted by <br> <span>1,200+</span> Learners </p>
									</div>
								</div>
							</div>
							<div class="auth-user-card">
								<div class="auth-user-card-item left">
									<img src="assets/img/auth/avatar/user-1.png" alt="Sarah">
									<h2 class="auth-user-card-title">Sarah Thompson</h2>
									<p>Founder & Lead Mentor</p>
								</div>

								<div class="auth-user-card-item active">
									<img src="assets/img/auth/avatar/user-2.png" alt="Daniel">
									<h2 class="auth-user-card-title">Daniel Reed</h2>
									<p>Program Director</p>
								</div>

								<div class="auth-user-card-item right">
									<img src="assets/img/auth/avatar/user-3.png" alt="Maya">
									<h2 class="auth-user-card-title">Maya Patel</h2>
									<p>Community Manager</p>
								</div>
							</div>

							<div class="auth-shape-1">
								<img src="assets/img/auth/shape-1.png" alt="">
							</div>
							<div class="auth-shape-2">
								<img src="assets/img/auth/shape-2.png" alt="">
							</div>
							<div class="auth-shape-3">
								<img src="assets/img/auth/Vector.png" alt="">
								<img src="assets/img/auth/Vector-1.png" alt="">
								<img src="assets/img/auth/Vector-2.png" alt="">
							</div>

						</div>
					</div>
					<!-- end col -->

					<!-- start col -->
					<div class="col-lg-5">
						<div class="auth-wrapper-right">
							<div class="auth-logo">
								<a href="index.html.htm"><img src="assets/img/logo.svg" alt=""></a>
							</div>
							<form action="#" class="auth-form">
								<div class="form-header ment-header">
									<h2 class="title">Mentor Register   <a href="mentee-register.html.htm" class="link">Not a Mentor?</a></h2>
									<p>Quick and secure access with simple sign up.</p>
								</div>
								<div class="social-auth d-none">
									<div class="social-logo-list">
										<a href="#">
											<div class="social-logo">
												<img src="assets/img/auth/social-icon/Google.png" alt="">
											</div>
										</a>
										<a href="#">
											<div class="social-logo">
												<img src="assets/img/auth/social-icon/Facebook.png" alt="">
											</div>
										</a>
										<a href="#">
											<div class="social-logo">
												<img src="assets/img/auth/social-icon/Apple.png" alt="">
											</div>
										</a>
									</div>
									<div class="auth-divider">
										<span>Or</span>
									</div>
								</div>
								<div class="auth-form-input">
									<div class="mb-4 input-group-flat">
										<label class="form-label">
											Name
											<span class="text-danger ms-1">*</span>
										</label>
										<input type="text" class="form-control" placeholder="Enter Your Name">
									</div>
									<div class="mb-4 input-group-flat">
										<label class="form-label">
											Email
											<span class="text-danger ms-1">*</span>
										</label>
										<input type="email" class="form-control" placeholder="Enter Your Email">
									</div>
									<div class="mb-4">
										<label class="form-label">Password
											<span class="text-danger ms-1">*</span>
										</label>
										<div class="input-group input-group-flat pass-group">
											<input type="password" class="form-control pass-input" placeholder="**********">
											<span class="input-group-text toggle-password">
												<i class=" icon-eye-off"></i>
											</span>
										</div>
									</div>
									<div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-4">
										<div class="d-flex align-items-center">
											<div class="form-check form-check-md mb-0">
												<input class="form-check-input" id="remember_me" type="checkbox">
												<label for="remember_me" class="form-check-label mt-0 text">I agree with <a href="{% url 'core:terms' %}" class="text-primart text-decoration-underline fw-semibold">Terms & Service</a> </label>
											</div>
										</div>
									</div>
									<div class="mb-4">
										<button type="submit" class="primary-btn w-100 justify-content-center">Sign
											Up</button>
									</div>
									<div class="text-center">
										<p class="mb-0">Already have an account? <a href="login.html.htm" class="link-primary">Sign In</a></p>
									</div>
								</div>
							</form>
						</div>
					</div>
					<!-- end col -->

				</div>
				<!-- End row -->
			</div>
		</div>
		<!-- End Content -->

	</div>
	<!-- /Main Wrapper -->

	<!-- jQuery -->
	<script src="assets/js/jquery-3.7.1.min.js"></script>

	<!-- Bootstrap Core JS -->
	<script src="assets/js/bootstrap.bundle.min.js"></script>

	<!-- Custom JS -->
	<script src="assets/js/script.js"></script>

</body>

</html>
